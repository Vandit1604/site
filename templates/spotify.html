<!-- Recently played on Spotify. Renders only when .nowPlaying is set
     (i.e. Spotify is configured and the API call succeeded). Clean soft card:
     rounded album art, three stacked lines, one green accent (the logo). -->
{{ if .nowPlaying }}
<section data-reveal class="box">
  <a
    href="{{ .nowPlaying.URL }}"
    target="_blank"
    rel="noopener noreferrer"
    class="group inline-flex w-full max-w-sm items-center gap-3.5 border border-gray-200 dark:border-neutral-800 p-3 boxy-hover press"
  >
    {{ if .nowPlaying.AlbumArt }}
    <img
      src="{{ .nowPlaying.AlbumArt }}"
      alt=""
      width="60"
      height="60"
      loading="lazy"
      class="h-15 w-15 flex-shrink-0 rounded-lg object-cover"
      style="height:60px;width:60px"
    />
    {{ end }}
    <span class="flex min-w-0 flex-col gap-0.5">
      <span class="inline-flex items-center gap-1.5 font-mono text-[10px] uppercase tracking-[0.14em] text-gray-500 dark:text-gray-500">
        <svg class="h-3 w-3 flex-shrink-0 text-[#1DB954]" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.52 17.34c-.24.36-.66.48-1.02.24-2.82-1.74-6.36-2.1-10.56-1.14-.42.12-.78-.18-.9-.54-.12-.42.18-.78.54-.9 4.56-1.02 8.52-.6 11.64 1.32.42.18.48.66.3 1.02zm1.44-3.3c-.3.42-.84.6-1.26.3-3.24-1.98-8.16-2.58-11.94-1.38-.48.12-1.02-.12-1.14-.6-.12-.48.12-1.02.6-1.14 4.38-1.32 9.78-.66 13.5 1.62.36.18.54.78.24 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.1 9.3c-.6.18-1.2-.18-1.38-.72-.18-.6.18-1.2.72-1.38 4.32-1.32 11.4-1.02 15.9 1.62.54.3.72 1.02.42 1.56-.3.48-1.02.66-1.56.36z"/>
        </svg>
        Recently played
      </span>
      <span class="truncate text-[15px] font-semibold leading-snug text-black dark:text-white">{{ .nowPlaying.Title }}</span>
      <span class="truncate text-xs text-gray-500 dark:text-gray-400">{{ .nowPlaying.Artist }}</span>
    </span>
  </a>
</section>
{{ end }}
