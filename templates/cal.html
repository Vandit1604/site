<!-- Connect section: compact Cal.com embed (left) + contact bento (right) -->
<section data-reveal class="mt-12 p-4" aria-labelledby="connect-heading">
  <h2 id="connect-heading" class="text-2xl font-bold mb-2">
    <span>Let's connect</span>
  </h2>
  <p class="text-gray-600 dark:text-gray-400 mb-6 max-w-xl">
    Book a 30-minute slot on the left, or reach me on any of these — distributed
    systems, infrastructure, open source, or just to say hi.
  </p>

  <div class="grid gap-4 lg:grid-cols-5">
    <!-- Left: booking calendar -->
    <div
      class="relative lg:col-span-3 overflow-hidden rounded-lg border border-gray-200 dark:border-neutral-800"
    >
      <!-- Shown until the Cal.com embed mounts, and stays if it never loads,
           so this panel is never just an empty box. -->
      <div
        id="cal-fallback"
        class="absolute inset-0 z-0 flex flex-col items-center justify-center gap-3 p-6 text-center"
      >
        <svg class="h-6 w-6 animate-spin text-gray-400 motion-reduce:animate-none" viewBox="0 0 24 24" fill="none" aria-hidden="true">

          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v3a5 5 0 00-5 5H4z" />
        </svg>
        <p class="text-sm text-gray-600 dark:text-gray-400">Loading the booking calendar…</p>
        <a
          href="https://cal.com/v4nd1t/30min"
          target="_blank"
          rel="noopener noreferrer"
          class="text-sm font-medium text-gray-900 dark:text-gray-100 underline underline-offset-4 hover:opacity-80"
        >
          Or book directly on Cal.com →
        </a>
      </div>
      <div
        style="width:100%;height:560px;overflow:auto"
        id="my-cal-inline-30min"
        class="relative z-10"

            <span class="text-xs text-gray-500 dark:text-gray-400">@Vandit1604</span>

      >

          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span class="mt-3 flex items-end justify-between">
          <span class="flex flex-col">
            <span class="text-sm font-semibold text-gray-900 dark:text-gray-100">Résumé</span>
            <span class="text-xs text-gray-500 dark:text-gray-400">PDF</span>
          </span>
          <span class="text-gray-400 dark:text-gray-500 transition-transform group-hover:translate-x-0.5">→</span>
        </span>
      </a>
    </div>
  </div>
</section>

<script type="text/javascript">
  (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
  Cal("init", "30min", { origin: "https://app.cal.com" });

  // Read the site's current theme from the `dark` class on <html> (set on boot
  // in header.html, flipped by the nav toggle).
  function siteTheme() {
    return document.documentElement.classList.contains("dark") ? "dark" : "light";
  }

  function applyCalTheme() {
    Cal.ns["30min"]("ui", {
      hideEventTypeDetails: false,
      layout: "month_view",
      theme: siteTheme(),
    });
  }

  Cal.ns["30min"]("inline", {
    elementOrSelector: "#my-cal-inline-30min",
    config: {
      layout: "month_view",
      useSlotsViewOnSmallScreen: "true",
      theme: siteTheme(),
    },
    calLink: "v4nd1t/30min",
  });

  applyCalTheme();

  // Hide the loading fallback once Cal injects its iframe; if it never loads,
  // the fallback (with a direct booking link) stays visible.
  (function () {
    var target = document.getElementById("my-cal-inline-30min");
    var fb = document.getElementById("cal-fallback");
    if (!target || !fb) return;
    var mo = new MutationObserver(function () {
      if (target.children.length) {
        fb.style.display = "none";
        mo.disconnect();
      }
    });
    mo.observe(target, { childList: true });
  })();

  // Re-theme the embed when the user toggles light/dark after load.
  new MutationObserver(applyCalTheme).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ["class"],
  });
</script>
