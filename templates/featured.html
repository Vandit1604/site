<!-- featured projects section -->
<section data-reveal class="box">
  <div class="flex items-end justify-between mb-6">
    <h2 class="text-2xl font-bold tracking-tight">Featured Work</h2>
    <a href="/projects" class="text-sm text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors">
      All projects →
    </a>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 auto-rows-fr">
    {{ range .featuredProjects }}
    {{ template "projectCard" . }}
    {{ end }}
  </div>
</section>
