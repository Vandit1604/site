<script>
  // "More" dropdown: toggle, close on outside click / Escape.
  (function () {
    var btn = document.querySelector(".nav-more__btn");
    var menu = document.getElementById("nav-more-menu");
    if (!btn || !menu) return;
    function onDoc(e) {
      if (!menu.contains(e.target) && !btn.contains(e.target)) close();
    }
    function onKey(e) {
      if (e.key === "Escape") { close(); btn.focus(); }
    }
    function open() {
      menu.hidden = false;
      btn.setAttribute("aria-expanded", "true");
      document.addEventListener("click", onDoc);
      document.addEventListener("keydown", onKey);
    }
    function close() {
      menu.hidden = true;
      btn.setAttribute("aria-expanded", "false");
      document.removeEventListener("click", onDoc);
      document.removeEventListener("keydown", onKey);
    }
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      menu.hidden ? open() : close();
    });
  })();

  // Mark the current page for orientation (highlights a top link, or "More"
  // when the active page lives inside the dropdown).
  (function () {
    var here = location.pathname.replace(/\/$/, "") || "/";
    var inMore = false;
    document.querySelectorAll('.nav-inner a[href^="/"]').forEach(function (a) {
      var path = a.getAttribute("href").replace(/\/$/, "") || "/";
      if (path === here) {
        a.setAttribute("aria-current", "page");
        if (a.classList.contains("nav-more__item")) inMore = true;
      }
    });
    if (inMore) {
      var b = document.querySelector(".nav-more__btn");
      if (b) b.setAttribute("aria-current", "page");
    }
  })();

  // Dark-mode toggle: flip the `dark` class on <html> via a View Transition
  // (45° slash wipe in motion.css); instant swap where unsupported / reduced.
  function setTheme() {
    var isDark = document.documentElement.classList.toggle("dark");
    try { localStorage.setItem("theme", isDark ? "dark" : "light"); } catch (e) {}
  }
  document.querySelectorAll(".theme-toggle").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduce || !document.startViewTransition) { setTheme(); return; }
      document.startViewTransition(setTheme);
    });
  });
</script>
