<!-- Add JavaScript to handle the drawer toggle -->
<script>
  const menuToggle = document.getElementById("menu-toggle");
  const drawer = document.getElementById("drawer");
  const closeDrawer = document.getElementById("close-drawer");
  const backdrop = document.getElementById("drawer-backdrop");

  function openDrawer() {
    drawer.classList.remove("-translate-x-full");
    drawer.removeAttribute("inert");
    backdrop.classList.remove("opacity-0");
    menuToggle.setAttribute("aria-expanded", "true");
    closeDrawer.focus();
    document.addEventListener("keydown", onKeydown);
  }

  function closeDrawerFn() {
    drawer.classList.add("-translate-x-full");
    drawer.setAttribute("inert", "");
    backdrop.classList.add("opacity-0");
    menuToggle.setAttribute("aria-expanded", "false");
    menuToggle.focus();
    document.removeEventListener("keydown", onKeydown);
  }

  function onKeydown(e) {
    if (e.key === "Escape") closeDrawerFn();
  }

  menuToggle.addEventListener("click", openDrawer);
  closeDrawer.addEventListener("click", closeDrawerFn);
  backdrop.addEventListener("click", closeDrawerFn);
  // Close after following an in-page link so the drawer doesn't linger.
  drawer.querySelectorAll("a[href]").forEach((a) =>
    a.addEventListener("click", closeDrawerFn)
  );

  // Mark the current page in both the drawer and the desktop bar for orientation.
  (function markActive() {
    const here = location.pathname.replace(/\/$/, "") || "/";
    document.querySelectorAll('nav a[href^="/"]').forEach((a) => {
      const path = a.getAttribute("href").replace(/\/$/, "") || "/";
      if (path === here) {
        a.setAttribute("aria-current", "page");
        a.classList.add("text-gray-900", "dark:text-gray-100", "underline");
      }
    });
  })();

  // Dark-mode toggle: flip the `dark` class on <html> and remember the choice.
  document.querySelectorAll(".theme-toggle").forEach((btn) => {
    btn.addEventListener("click", () => {
      const isDark = document.documentElement.classList.toggle("dark");
      try {
        localStorage.setItem("theme", isDark ? "dark" : "light");
      } catch (e) {}
    });
  });
</script>
