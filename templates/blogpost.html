{{ template "header.html" . }}

<!-- Blog-specific stylesheets. header.html has already opened <body>, so these
     are intentionally body-level <link>s (valid HTML) rather than a second
     <head> block. blogpost.css is loaded LAST so its reading refinements win
     over markdown.css for the shared .blog-content element. -->
<link rel="stylesheet" href="/static/css/markdown.css">
<link rel="stylesheet" href="/static/css/syntax-highlighting.css">
<link rel="stylesheet" href="/static/css/blogpost.css">

<section class="max-w-4xl w-full mx-auto p-4">
  {{ template "nav.html" .}}

  <article class="mx-auto max-w-2xl mt-8 mb-20">
    <!-- Back link -->
    <div class="mb-8">
      <a href="/blogs"
        class="press group inline-flex items-center gap-1.5 font-mono text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors">
        <span class="inline-block transition-transform duration-300 ease-out group-hover:-translate-x-0.5">&larr;</span>
        Back to blogs
      </a>
    </div>

    <!-- Post header -->
    <header data-reveal class="mb-8">
      <time class="font-mono text-xs uppercase tracking-widest text-gray-500 dark:text-gray-500">{{ .blog.Date }}</time>
      <h1 class="mt-3 text-3xl sm:text-4xl font-bold tracking-tight leading-tight text-black dark:text-white">{{ .blog.Title }}</h1>
      {{ if .blog.Tags }}
      <div class="mt-4 flex flex-wrap gap-1.5">
        {{ range .blog.Tags }}
        <span class="font-mono text-xs rounded-full border border-gray-300 dark:border-neutral-700 px-2 py-0.5 text-gray-600 dark:text-gray-400">{{ . }}</span>
        {{ end }}
      </div>
      {{ end }}
    </header>

    <hr class="border-0 border-t border-gray-200 dark:border-neutral-800 mb-10" />

    <!-- Post body -->
    <div data-reveal>
      {{ .blog.Content }}
    </div>
  </article>
</section>

{{ template "footer.html" . }}
