{{ template "header.html" .}}

<section class="w-full">
  {{ template "nav.html" .}}

  <div class="px-6 pt-8 pb-6">
    <h1 class="text-4xl sm:text-5xl font-bold tracking-tight text-black dark:text-white">Library.</h1>
    <p class="mt-3 text-gray-600 dark:text-gray-400 max-w-xl">
      Books, tools, and resources worth keeping around.
    </p>
  </div>

  <section class="box space-y-12">
    {{ range .Categories }}
    <div>
      <h2 class="font-mono text-xs uppercase tracking-widest text-gray-500 dark:text-gray-500 mb-4 pb-2 border-b border-gray-200 dark:border-neutral-800">{{ .Name }}</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        {{ range .Links }}
        <a href="{{ .URL }}" target="_blank" rel="noopener noreferrer"
          data-reveal
          class="cell lift press boxy-hover group flex flex-col p-4">
          <h3 class="text-base font-semibold text-gray-900 dark:text-gray-100 flex items-center gap-1.5">
            <span class="inline-block transition-transform duration-300 ease-out group-hover:translate-x-0.5">{{ .Title }}</span>
            <span class="text-gray-300 dark:text-neutral-600 opacity-0 group-hover:opacity-100 transition-opacity">&rarr;</span>
          </h3>
          <p class="mt-1.5 text-sm text-gray-600 dark:text-gray-400">{{ .Description }}</p>
        </a>
        {{ end }}
      </div>
    </div>
    {{ else }}
    <p class="text-gray-500 dark:text-gray-400">Nothing here yet.</p>
    {{ end }}
  </section>
</section>

{{ template "footer.html" .}}
