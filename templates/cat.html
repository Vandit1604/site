{{/* Shared interactive cat used in the hero and the footer. The wrapping
     .cat element (with its position modifier + .is-sleeping) lives at each
     call site; micro.js wires up cursor states for every .cat on the page. */}}
{{ define "catInner" }}
<span class="cat__z cat__z--1">z</span>
<span class="cat__z cat__z--2">z</span>
<span class="cat__z cat__z--3">z</span>
<svg class="cat__svg" viewBox="0 0 48 46" fill="none" aria-hidden="true">
  <g class="cat__tail">
    <path d="M35 35 C 46 34 47 22 40 17" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
  </g>
  <path class="cat__body" d="M13 45 C 11 30 18 24 24 24 C 30 24 37 30 35 45 Z" fill="currentColor"/>
  <ellipse cx="20" cy="43.5" rx="3.3" ry="2.5" fill="currentColor"/>
  <ellipse cx="28" cy="43.5" rx="3.3" ry="2.5" fill="currentColor"/>
  <g class="cat__ear cat__ear--l"><path d="M13 12 L9.5 2 L21 8 Z" fill="currentColor"/><path d="M13.6 10 L12 4.8 L18.2 8 Z" fill="var(--cat-ear)"/></g>
  <g class="cat__ear cat__ear--r"><path d="M35 12 L38.5 2 L27 8 Z" fill="currentColor"/><path d="M34.4 10 L36 4.8 L29.8 8 Z" fill="var(--cat-ear)"/></g>
  <circle cx="24" cy="17" r="12" fill="currentColor"/>
  <path d="M24 6 v5 M19 6.6 l1.4 4 M29 6.6 l-1.4 4" stroke="var(--cat-stripe)" stroke-width="1.5" stroke-linecap="round"/>
  <g class="cat__eyes">
    <ellipse cx="19" cy="17" rx="2.7" ry="3.4" fill="#f6f5f2"/>
    <ellipse cx="29" cy="17" rx="2.7" ry="3.4" fill="#f6f5f2"/>
    <g class="cat__pupils">
      <circle cx="19" cy="17.4" r="1.5" fill="#161616"/>
      <circle cx="29" cy="17.4" r="1.5" fill="#161616"/>
      <circle cx="19.7" cy="16.6" r="0.55" fill="#fff"/>
      <circle cx="29.7" cy="16.6" r="0.55" fill="#fff"/>
    </g>
  </g>
  <g class="cat__eyes-closed">
    <path d="M16.6 17.4 q2.4 2.1 4.8 0" stroke="#161616" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M26.6 17.4 q2.4 2.1 4.8 0" stroke="#161616" stroke-width="1.3" stroke-linecap="round"/>
  </g>
  <path d="M22.7 20.6 L25.3 20.6 L24 22.4 Z" fill="var(--cat-nose)"/>
  <path d="M24 22.4 v1.4 M24 23.8 q-1.6 1.3 -3 0 M24 23.8 q1.6 1.3 3 0" stroke="var(--cat-stripe)" stroke-width="1" stroke-linecap="round"/>
  <g stroke="var(--cat-whisker)" stroke-width="0.9" stroke-linecap="round">
    <path d="M14.5 20 l-6.5 -1.4 M14.5 22.4 l-6.5 1.2"/>
    <path d="M33.5 20 l6.5 -1.4 M33.5 22.4 l6.5 1.2"/>
  </g>
  <path class="cat__heart" d="M24 4 C 22.4 1.4 18.5 2.2 18.5 5.2 C 18.5 7.4 21.6 9 24 11 C 26.4 9 29.5 7.4 29.5 5.2 C 29.5 2.2 25.6 1.4 24 4 Z" fill="#e5647f"/>

{{ end }}
