<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect class="diagram-bg" x="0" y="0" width="680" height="340" fill="#f8f8f7"/>
  <title>How emailguard decides: four checks, cheapest first</title>
  <desc>An email flows through an allowlist shortcut, a disposable-domain blocklist, an MX-records check, and an MX-hostname keyword scan. Any failing check rejects; passing all of them accepts.</desc>
  <style>
    .h{font-size:13px;font-weight:500;fill:#1a1a18}
    .m{font-size:12px;font-family:ui-monospace,SFMono-Regular,monospace}
    .c{font-size:12px;fill:#5f5e5a}
  </style>
  <defs>
    <marker id="a7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="a7r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="26" class="m" fill="#5f5e5a">someone@domain.com</text>

  <!-- 4 stacked checks -->
  <g><rect x="30" y="40" width="330" height="46" rx="8" fill="#eef1f4" stroke="#8a9099" stroke-width="0.5"/><text x="46" y="60" class="h">1. On the allowlist? (gmail, outlook...)</text><text x="46" y="77" class="c">known-good consumer providers skip the rest</text></g>
  <line x1="195" y1="86" x2="195" y2="108" stroke="#73726c" stroke-width="1.5" marker-end="url(#a7)"/>

  <g><rect x="30" y="110" width="330" height="46" rx="8" fill="#eef1f4" stroke="#8a9099" stroke-width="0.5"/><text x="46" y="130" class="h">2. On the disposable blocklist?</text><text x="46" y="147" class="c">domain or its eTLD+1, synced from GitHub</text></g>
  <line x1="195" y1="156" x2="195" y2="178" stroke="#73726c" stroke-width="1.5" marker-end="url(#a7)"/>

  <g><rect x="30" y="180" width="330" height="46" rx="8" fill="#eef1f4" stroke="#8a9099" stroke-width="0.5"/><text x="46" y="200" class="h">3. Has MX records? (1s timeout)</text><text x="46" y="217" class="c">no mail server means no real inbox</text></g>
  <line x1="195" y1="226" x2="195" y2="248" stroke="#73726c" stroke-width="1.5" marker-end="url(#a7)"/>

  <g><rect x="30" y="250" width="330" height="46" rx="8" fill="#eef1f4" stroke="#8a9099" stroke-width="0.5"/><text x="46" y="270" class="h">4. MX hostname looks like a forwarder?</text><text x="46" y="287" class="c">keyword scan on the actual mail server</text></g>
  <line x1="195" y1="296" x2="195" y2="318" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#a7)"/>

  <!-- reject rail on the right -->
  <line x1="360" y1="63" x2="470" y2="63" stroke="#993C1D" stroke-width="1.5" marker-end="url(#a7r)"/>
  <line x1="360" y1="133" x2="470" y2="133" stroke="#993C1D" stroke-width="1.5" marker-end="url(#a7r)"/>
  <line x1="360" y1="203" x2="470" y2="203" stroke="#993C1D" stroke-width="1.5" marker-end="url(#a7r)"/>
  <line x1="360" y1="273" x2="470" y2="273" stroke="#993C1D" stroke-width="1.5" marker-end="url(#a7r)"/>
  <g><rect x="474" y="150" width="176" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="562" y="176" class="h" fill="#712B13" text-anchor="middle">Reject</text><text x="562" y="194" class="c" fill="#993C1D" text-anchor="middle">any check fails, bail early</text></g>

  <!-- accept -->
  <g><rect x="30" y="320" width="330" height="16" rx="6" fill="none"/></g>
  <g><rect x="474" y="290" width="176" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="562" y="318" class="h" fill="#085041" text-anchor="middle">Accept: real business email</text></g>
  <line x1="360" y1="313" x2="470" y2="313" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#a7)"/>
</svg>
