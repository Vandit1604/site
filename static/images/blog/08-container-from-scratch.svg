<svg width="100%" viewBox="0 0 680 384" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>What "starting a container" actually means: re-exec into fresh namespaces, then pivot_root</title>
  <desc>The dockerium binary runs on the host, re-execs itself as a child into a new set of Linux namespaces, mounts a private proc, pivot_roots into the pulled image rootfs, sets the hostname, and finally execs bin sh as PID 1. A user namespace maps the caller to root inside only, which is what makes it rootless.</desc>
  <style>
    .h{font-size:13px;font-weight:500;fill:#1a1a18}
    .m{font-size:12px;font-family:ui-monospace,SFMono-Regular,monospace;fill:#5f5e5a}
    .c{font-size:12px;fill:#5f5e5a}
    .bx{fill:#eef1f4;stroke:#8a9099;stroke-width:0.5}
    .ns{fill:#eef1f4;stroke:#8a9099;stroke-width:1;stroke-dasharray:5 4}
    .ok{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
    .okh{font-size:13px;font-weight:500;fill:#085041}
    @media (prefers-color-scheme:dark){
      .h{fill:#e8e6df}.c{fill:#b4b2a9}.m{fill:#b4b2a9}
      .bx{fill:#1a2230;stroke:#3a4656}.ns{fill:#141b26;stroke:#44506a}
      .ok{fill:#0e2a22;stroke:#1f6b57}.okh{fill:#7fd6b8}
    }
  </style>
  <defs>
    <marker id="c8" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="26" class="m">$ dockerium alpine</text>

  <!-- parent on the host -->
  <g><rect x="30" y="40" width="360" height="46" rx="8" class="bx"/><text x="46" y="60" class="h">Parent process, on the host</text><text x="46" y="77" class="c">pulls the image, then sets the clone flags</text></g>
  <line x1="210" y1="86" x2="210" y2="106" stroke="#73726c" stroke-width="1.5" marker-end="url(#c8)"/>

  <!-- re-exec child -->
  <g><rect x="30" y="108" width="360" height="46" rx="8" class="bx"/><text x="46" y="128" class="h">Re-exec itself as the child</text><text x="46" y="145" class="m">reexec.Command("initialisation") + Cloneflags</text></g>
  <line x1="210" y1="154" x2="210" y2="174" stroke="#73726c" stroke-width="1.5" marker-end="url(#c8)"/>

  <!-- the new namespace set -->
  <g>
    <rect x="30" y="176" width="360" height="122" rx="8" class="ns"/>
    <text x="46" y="198" class="h">New namespace set: mnt · pid · net · uts · ipc · user</text>
    <text x="46" y="224" class="c">1 · mount a private /proc</text>
    <text x="46" y="248" class="c">2 · pivot_root into the pulled rootfs, detach the old</text>
    <text x="46" y="272" class="c">3 · sethostname → dockerium</text>
  </g>
  <line x1="210" y1="298" x2="210" y2="320" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#c8)"/>

  <!-- exec shell -->
  <g><rect x="30" y="322" width="360" height="46" rx="8" class="ok"/><text x="46" y="342" class="okh">exec /bin/sh</text><text x="46" y="359" class="c">now PID 1 in its own little world</text></g>

  <!-- user-namespace side note -->
  <line x1="390" y1="237" x2="428" y2="237" stroke="#73726c" stroke-width="1.5" marker-end="url(#c8)"/>
  <g>
    <rect x="430" y="176" width="220" height="122" rx="8" class="bx"/>
    <text x="446" y="200" class="h">CLONE_NEWUSER</text>
    <text x="446" y="226" class="c">maps your uid → 0, but</text>
    <text x="446" y="246" class="c">only inside the container.</text>
    <text x="446" y="272" class="c">The whole rootless trick:</text>
    <text x="446" y="292" class="c">root in here, you out there.</text>
  </g>
</svg>
