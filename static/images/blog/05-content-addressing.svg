<svg width="100%" viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect class="diagram-bg" x="0" y="0" width="680" height="250" fill="#f8f8f7"/>
  <title>Content addressing: the bytes decide the address</title>
  <desc>The same bytes hashed with SHA-256 always produce the same CID. Changing a single byte produces a completely different CID.</desc>
  <style>
    .h{font-size:13px;font-weight:500;fill:#1a1a18}
    .m{font-size:13px;font-family:ui-monospace,SFMono-Regular,monospace}
    .c{font-size:12px;fill:#5f5e5a}
  </style>
  <defs>
    <marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- row 1: identical bytes -> same CID -->
  <g><rect x="24" y="34" width="150" height="46" rx="8" fill="#eef1f4" stroke="#8a9099" stroke-width="0.5"/><text x="99" y="55" class="m" fill="#333" text-anchor="middle">"hello world"</text><text x="99" y="72" class="c" text-anchor="middle" font-size="11">the exact bytes</text></g>
  <line x1="178" y1="57" x2="232" y2="57" stroke="#73726c" stroke-width="1.5" marker-end="url(#a5)"/>
  <g><rect x="236" y="34" width="120" height="46" rx="8" fill="#eef1f4" stroke="#8a9099" stroke-width="0.5"/><text x="296" y="61" class="m" fill="#333" text-anchor="middle">SHA-256</text></g>
  <line x1="360" y1="57" x2="414" y2="57" stroke="#73726c" stroke-width="1.5" marker-end="url(#a5)"/>
  <g><rect x="418" y="34" width="238" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="537" y="61" class="m" fill="#085041" text-anchor="middle">bafkreib...a1c3  (the CID)</text></g>

  <text class="c" x="24" y="118">Same bytes in, same address out. Every time. That is the whole promise.</text>

  <!-- row 2: one byte changed -> new CID -->
  <g><rect x="24" y="150" width="150" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="99" y="171" class="m" fill="#712B13" text-anchor="middle">"hello w<tspan font-weight="700">0</tspan>rld"</text><text x="99" y="188" class="c" text-anchor="middle" font-size="11">one byte changed</text></g>
  <line x1="178" y1="173" x2="232" y2="173" stroke="#73726c" stroke-width="1.5" marker-end="url(#a5)"/>
  <g><rect x="236" y="150" width="120" height="46" rx="8" fill="#eef1f4" stroke="#8a9099" stroke-width="0.5"/><text x="296" y="177" class="m" fill="#333" text-anchor="middle">SHA-256</text></g>
  <line x1="360" y1="173" x2="414" y2="173" stroke="#73726c" stroke-width="1.5" marker-end="url(#a5)"/>
  <g><rect x="418" y="150" width="238" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="537" y="177" class="m" fill="#712B13" text-anchor="middle">bafkreih...9f7e  (totally different)</text></g>

  <text class="c" x="24" y="230">Change one byte and the address is unrecognizable. The name cannot drift from the content.</text>
</svg>
