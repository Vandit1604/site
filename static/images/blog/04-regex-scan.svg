<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title>Regex matcher scans every label value</title>
  <desc>For pod matches web dot star, Prometheus tests each existing value web-1 web-2 db-1 cache-1, matches the two web values, then unions their postings lists.</desc>
  <style>
    .h{font-size:14px;font-weight:500;fill:#1a1a18}
    .c{font-size:12px;fill:#5f5e5a}
    @media (prefers-color-scheme:dark){.h{fill:#e8e6df}.c{fill:#b4b2a9}}
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text class="h" x="40" y="32">query:  pod=~"web.*"   → must test every value of label "pod"</text>
  <g><rect x="40" y="52" width="200" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="60" y="77" font-size="14" font-weight="500" fill="#085041">web-1</text><text x="210" y="77" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">✓</text></g>
  <g><rect x="40" y="100" width="200" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="60" y="125" font-size="14" font-weight="500" fill="#085041">web-2</text><text x="210" y="125" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">✓</text></g>
  <g><rect x="40" y="148" width="200" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/><text x="60" y="173" font-size="12" fill="#5F5E5A">db-1</text><text x="210" y="173" font-size="12" fill="#5F5E5A" text-anchor="middle">✗</text></g>
  <g><rect x="40" y="196" width="200" height="40" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/><text x="60" y="221" font-size="12" fill="#5F5E5A">cache-1</text><text x="210" y="221" font-size="12" fill="#5F5E5A" text-anchor="middle">✗</text></g>
  <text class="c" x="270" y="116">matched values</text>
  <line x1="250" y1="120" x2="330" y2="120" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>
  <g><rect x="350" y="74" width="290" height="92" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="370" y="100" font-size="14" font-weight="500" fill="#085041">union the matched lists</text><text x="370" y="122" font-size="12" fill="#0F6E56">web-1 → [1, 5]</text><text x="370" y="140" font-size="12" fill="#0F6E56">web-2 → [8]</text><text x="370" y="158" font-size="12" fill="#0F6E56">∪  =  [1, 5, 8]</text></g>
  <text class="c" x="40" y="272">100k distinct values for that label = 100k regex tests, every query. This is why high-cardinality</text>
  <text class="c" x="40" y="292">labels + regex matchers are the classic Prometheus performance trap.</text>
</svg>
