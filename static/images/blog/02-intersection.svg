<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect class="diagram-bg" x="0" y="0" width="680" height="300" fill="#f8f8f7"/>
  <title>Query resolved by intersecting two postings lists</title>
  <desc>The query job equals api and code equals 500 intersects the lists 1 2 4 and 2 4 to return matching series 2 and 4.</desc>
  <style>
    .h{font-size:14px;font-weight:500;fill:#1a1a18}
    .c{font-size:12px;fill:#5f5e5a}
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text class="h" x="40" y="30">{job="api", code="500"}</text>
  <g><rect x="40" y="48" width="150" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="115" y="70" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">job="api"</text><text x="115" y="86" font-size="12" fill="#185FA5" text-anchor="middle">[1, 2, 4]</text></g>
  <g><rect x="230" y="48" width="50" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="255" y="76" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">1</text></g>
  <g><rect x="290" y="48" width="50" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="315" y="76" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">2</text></g>
  <g><rect x="350" y="48" width="50" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="375" y="76" font-size="14" font-weight="500" fill="#0C447C" text-anchor="middle">4</text></g>
  <g><rect x="40" y="108" width="150" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="115" y="130" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle">code="500"</text><text x="115" y="146" font-size="12" fill="#993C1D" text-anchor="middle">[2, 4]</text></g>
  <g><rect x="290" y="108" width="50" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="315" y="136" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle">2</text></g>
  <g><rect x="350" y="108" width="50" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="375" y="136" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle">4</text></g>
  <text class="h" x="200" y="200" text-anchor="middle">∩  intersect</text>
  <line x1="200" y1="160" x2="200" y2="212" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>
  <g><rect x="290" y="172" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="370" y="196" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">matches → [2, 4]</text><text x="370" y="216" font-size="12" fill="#0F6E56" text-anchor="middle">series #2 and #4</text></g>
  <text class="c" x="40" y="268">Both lists are pre-sorted, so you walk them together in one parallel pass — no re-sorting, no nested loops.</text>
</svg>
