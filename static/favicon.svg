<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- Solid tile favicon: dark tile, pixel-art white "V" for Vandit. Fixed
       colors so it reads on light and dark tabs. Each pixel is a 10px cell
       with a 1px gap, giving the blocky 8-bit look. -->
  <rect width="100" height="100" rx="24" fill="#0a0a0a"/>
  <g fill="#ffffff">
    <!-- row 0 -->
    <rect x="15" y="20" width="9" height="9"/><rect x="25" y="20" width="9" height="9"/><rect x="65" y="20" width="9" height="9"/><rect x="75" y="20" width="9" height="9"/>
    <!-- row 1 -->
    <rect x="15" y="30" width="9" height="9"/><rect x="25" y="30" width="9" height="9"/><rect x="65" y="30" width="9" height="9"/><rect x="75" y="30" width="9" height="9"/>
    <!-- row 2 -->
    <rect x="25" y="40" width="9" height="9"/><rect x="35" y="40" width="9" height="9"/><rect x="55" y="40" width="9" height="9"/><rect x="65" y="40" width="9" height="9"/>
    <!-- row 3 -->
    <rect x="25" y="50" width="9" height="9"/><rect x="35" y="50" width="9" height="9"/><rect x="55" y="50" width="9" height="9"/><rect x="65" y="50" width="9" height="9"/>
    <!-- row 4 (arms merge) -->
    <rect x="35" y="60" width="9" height="9"/><rect x="45" y="60" width="9" height="9"/><rect x="55" y="60" width="9" height="9"/>
    <!-- row 5 (tip) -->
    <rect x="45" y="70" width="9" height="9"/>
  </g>
</svg>
