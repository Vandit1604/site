<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 7" shape-rendering="crispEdges">
  <!-- Pixel-grid "VS" monogram. Theme-aware: black on light, white on dark,
       matching the site's monochrome identity. crispEdges keeps the squares hard. -->
  <style>
    rect { fill: #000; }
    @media (prefers-color-scheme: dark) { rect { fill: #fff; } }
  </style>
  <!-- V (cols 0–6) -->
  <rect x="0" y="0" width="1" height="1"/><rect x="6" y="0" width="1" height="1"/>
  <rect x="0" y="1" width="1" height="1"/><rect x="6" y="1" width="1" height="1"/>
  <rect x="0" y="2" width="1" height="1"/><rect x="6" y="2" width="1" height="1"/>
  <rect x="1" y="3" width="1" height="1"/><rect x="5" y="3" width="1" height="1"/>
  <rect x="1" y="4" width="1" height="1"/><rect x="5" y="4" width="1" height="1"/>
  <rect x="2" y="5" width="1" height="1"/><rect x="4" y="5" width="1" height="1"/>
  <rect x="3" y="6" width="1" height="1"/>
  <!-- S (cols 9–15) -->
  <rect x="9" y="0" width="6" height="1"/>
  <rect x="9" y="1" width="1" height="1"/>
  <rect x="9" y="2" width="1" height="1"/>
  <rect x="9" y="3" width="6" height="1"/>
  <rect x="14" y="4" width="1" height="1"/>
  <rect x="14" y="5" width="1" height="1"/>
  <rect x="9" y="6" width="6" height="1"/>
</svg>
